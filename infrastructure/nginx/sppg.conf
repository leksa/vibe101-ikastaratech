# Reverse proxy produksi untuk dashboard SPPG.
# - Static (hasil `frontend/npm run build`) disajikan langsung.
# - /api diteruskan ke backend Express (:3000).
#
# Alternatif: backend Express sendiri sudah bisa menyajikan frontend/dist
# (lihat backend/server.js). Nginx dipakai bila ingin TLS / caching / banyak worker.

upstream sppg_api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name sppg.local;

    root /var/www/sppg/frontend/dist;
    index index.html;

    # API -> backend Express
    location /api/ {
        proxy_pass http://sppg_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Asset statis dengan cache panjang (hash di nama file dari Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
